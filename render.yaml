services:
  - type: web
    name: apoyo-mental-api
    runtime: python
    repo: https://github.com/Elvergal/apoyo-mental-api
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main_prod:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: ENVIRONMENT
        value: production
